<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Imposter">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/180/0d1117/ff4444?text=IMP">
    
    <title>Imposter Game: AP World</title>
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --text: #c9d1d9;
            --red: #ff4444; --green: #2ea043; --blue: #58a6ff; --border: #30363d;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        #app { background: var(--panel); width: 95%; max-width: 450px; padding: 25px; border-radius: 24px; border: 1px solid var(--border); text-align: center; box-shadow: 0 15px 60px rgba(0,0,0,0.6); }
        .screen { display: none; flex-direction: column; gap: 15px; }
        .active { display: flex; }
        h1 { font-size: 1.8rem; margin: 0; color: white; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { color: #8b949e; font-size: 0.85rem; }
        input, select { background: var(--bg); border: 1px solid var(--border); color: white; padding: 14px; border-radius: 12px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        .player-row { display: flex; gap: 8px; align-items: center; }
        .btn-remove { background: transparent; color: var(--red); border: 1px solid var(--red); width: 45px; height: 48px; border-radius: 10px; cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }
        button { background: var(--blue); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: transform 0.1s; }
        button:active { transform: scale(0.96); }
        .btn-success { background: var(--green); }
        .btn-danger { background: var(--red); }
        .btn-sec { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .card { background: var(--bg); border: 2px dashed var(--border); padding: 30px 20px; border-radius: 18px; margin: 10px 0; }
        .tag { display: inline-block; background: #1f2428; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; color: var(--blue); font-weight: bold; margin-bottom: 5px; }
        .vote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .imposter-status { color: var(--red); font-weight: 900; font-size: 1.5rem; margin-top: 10px; }
        .citizen-status { color: var(--green); font-weight: 900; font-size: 1.5rem; margin-top: 10px; }
    </style>
</head>
<body>

<div id="app">
    <div id="setup" class="screen active">
        <h1>IMPOSTER GAME</h1>
        <p class="subtitle">AP World History Edition</p>
        
        <div style="text-align: left; font-size: 0.8rem; display: flex; flex-direction: column; gap: 10px;">
            <select id="unit-select">
                <option value="all">Mixed (Units 1-9)</option>
                <option value="1-2">Units 1-2: Trade Networks</option>
                <option value="3-4">Units 3-4: Global Empires</option>
                <option value="5-6">Units 5-6: Industrial Era</option>
                <option value="7-9">Units 7-9: Modern History</option>
            </select>
            
            <div style="display: flex; gap: 10px;">
                <div style="flex:1">
